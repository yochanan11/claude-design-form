<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה ללייב - NotebookLM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        /* ===== Event Header ===== */
        .event-header {
            background:
                radial-gradient(ellipse at 50% -10%, rgba(37,99,214,0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 90%, rgba(0,201,167,0.15) 0%, transparent 50%),
                linear-gradient(160deg, #060d1f 0%, #0a1530 40%, #060d1a 70%, #040810 100%);
            border-radius: 16px;
            padding: 36px 28px 32px;
            text-align: center;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        /* decorative dots */
        .event-header::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(37,99,214,0.45) 1px, transparent 1px),
                radial-gradient(circle, rgba(0,201,167,0.3) 1px, transparent 1px);
            background-size: 60px 60px, 90px 90px;
            background-position: 0 0, 30px 30px;
            opacity: 0.35;
        }

        .event-header .live-label {
            color: #ccc;
            font-size: 16px;
            font-weight: 400;
            position: relative;
            z-index: 1;
            margin-bottom: 4px;
        }

        .event-header h1 {
            color: #2563D6;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 40px rgba(37,99,214,0.7), 0 0 12px rgba(0,201,167,0.3);
        }

        .presenter-wrap {
            position: relative;
            z-index: 1;
            margin: 18px auto 8px;
            width: auto;
            height: auto;
        }

        .presenter-photo {
            max-width: 200px;
            max-height: 90px;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto;
            object-fit: contain;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 10px 18px;
        }

        .presenter-name {
            color: #fff;
            font-size: 15px;
            position: relative;
            z-index: 1;
            margin-bottom: 14px;
        }

        .event-date {
            color: #fff;
            font-size: 15px;
            position: relative;
            z-index: 1;
            opacity: 0.85;
            letter-spacing: 1px;
        }

        /* ===== Form Card ===== */
        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 30px 28px 24px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.09);
        }

        .form-card h2 {
            font-size: 21px;
            font-weight: 700;
            text-align: center;
            color: #111;
            margin-bottom: 6px;
        }

        .form-subtitle {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 22px;
        }

        .form-group { margin-bottom: 12px; }

        input[type="text"],
        input[type="tel"],
        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            text-align: right;
            direction: rtl;
            color: #222;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }

        input[type="text"]::placeholder,
        input[type="tel"]::placeholder,
        input[type="email"]::placeholder { color: #bbb; }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        input[type="email"]:focus { border-color: #2563D6; }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 16px 0 20px;
            flex-direction: row-reverse;
        }

        .checkbox-group input[type="checkbox"] {
            width: 17px;
            height: 17px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            accent-color: #2563D6;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #555;
            cursor: pointer;
            line-height: 1.5;
        }

        .checkbox-group label a {
            color: #222;
            text-decoration: underline;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #2563D6;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover { background: #1a4eb5; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { background: #999; cursor: not-allowed; }

        .login-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }

        .login-link a { color: #2563D6; text-decoration: underline; }

        /* Messages */
        .msg {
            display: none;
            border-radius: 8px;
            padding: 14px 16px;
            text-align: center;
            font-size: 14px;
            margin-top: 14px;
        }

        .msg.success {
            background: #e8f5e9;
            border: 1px solid #81c784;
            color: #2e7d32;
        }

        .msg.error {
            background: #ffebee;
            border: 1px solid #e57373;
            color: #c62828;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="event-header">
        <div class="presenter-wrap">
            <img class="presenter-photo" src="logo.jpg" alt="לוגו">
        </div>
        <div class="live-label">לייב מקיף על</div>
        <h1>NotebookLM</h1>
        <div class="presenter-name">יוחנן שבדרון</div>
        <div class="event-date">יום ראשון | 03.05 | 20:30</div>
    </div>

    <!-- Form -->
    <div class="form-card">
        <h2>כניסה ללייב</h2>
        <p class="form-subtitle">מלאו את הפרטים כדי להצטרף לאירוע</p>

        <form id="regForm" novalidate>
            <div class="form-group">
                <input type="text" id="fullName" placeholder="שם מלא" required autocomplete="name">
            </div>
            <div class="form-group">
                <input type="tel" id="phone" placeholder="טלפון" required autocomplete="tel">
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="אימייל" required autocomplete="email">
            </div>

            <div class="checkbox-group">
                <label for="consent">
                    אני מאשר/ת קבלת דיוור ותוכן פרסומי בהתאם ל<a href="#" onclick="return false">מדיניות הפרטיות</a>
                </label>
                <input type="checkbox" id="consent" required>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">הרשמה ללייב</button>

            <div class="msg success" id="successMsg">✓ נרשמת בהצלחה! מעביר אותך לאתר...</div>
            <div class="msg error"   id="errorMsg">שגיאה בשליחה. אנא נסה שנית.</div>
        </form>

    </div>

</div>

<script>
    // ← הכנס כאן את ה-URL שמקבלים מ-Apps Script לאחר Deploy
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzA4W_EBtw4oNytb3Zgah8TCfJ-mHLgYi06uY4jSqvLCSfMEjOHJxroa3neXvqGqpQRgA/exec';

    document.getElementById('regForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const name    = document.getElementById('fullName').value.trim();
        const phone   = document.getElementById('phone').value.trim();
        const email   = document.getElementById('email').value.trim();
        const consent = document.getElementById('consent').checked;

        if (!name || !phone || !email) {
            alert('אנא מלא את כל השדות');
            return;
        }
        if (!consent) {
            alert('יש לאשר את מדיניות הפרטיות');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'שולח...';

        const successMsg = document.getElementById('successMsg');
        const errorMsg   = document.getElementById('errorMsg');
        successMsg.style.display = 'none';
        errorMsg.style.display   = 'none';

        const params = new URLSearchParams({
            timestamp: new Date().toLocaleString('he-IL', { timeZone: 'Asia/Jerusalem' }),
            fullName: name,
            phone: phone,
            email: email
        });

        try {
            await fetch(APPS_SCRIPT_URL + '?' + params.toString(), {
                method: 'GET',
                mode: 'no-cors'
            });
            successMsg.style.display = 'block';
            document.getElementById('regForm').reset();
            setTimeout(() => {
                window.location.href = 'https://www.shwadron-ai.com';
            }, 3000);
        } catch (err) {
            errorMsg.style.display = 'block';
            console.error(err);
        }

        btn.disabled = false;
        btn.textContent = 'הרשמה ללייב';
    });
</script>
</body>
</html>
